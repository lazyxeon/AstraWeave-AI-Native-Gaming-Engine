name: Documentation

on:
  push:
    branches: [ "main" ]
    paths:
      - '**/*.rs'
      - '**/*.md'
      - 'docs/**'
      - '.github/workflows/docs.yml'
  pull_request:
    branches: [ "main" ]
    paths:
      - '**/*.rs'
      - '**/*.md'
      - 'docs/**'
      - '.github/workflows/docs.yml'
  workflow_dispatch:
    inputs:
      rebuild_reason:
        description: 'Optional note for why the Pages site is being rebuilt manually'
        required: false
        type: string
      skip_link_check:
        description: 'Skip the broken-link check for a faster manual rebuild'
        required: false
        default: false
        type: boolean

permissions:
  contents: write
  pages: write
  id-token: write

env:
  MDBOOK_VERSION: '0.5.2'

jobs:
  build-and-deploy:
    name: Build and Deploy Docs
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Fetch docs LFS images
        run: |
          # Selective fetch via GitHub media CDN — avoids pulling all 1300+ LFS
          # objects and the bandwidth limits that come with a full lfs checkout.
          for f in docs/src/assets/Astraweave_logo.jpg docs/src/assets/top_series_time.png; do
            curl -sL "https://media.githubusercontent.com/media/${{ github.repository }}/main/$f" -o "$f"
          done
          # Verify we got real images, not LFS pointer text
          for f in docs/src/assets/Astraweave_logo.jpg docs/src/assets/top_series_time.png; do
            size=$(stat --format=%s "$f")
            if [ "$size" -lt 1000 ]; then
              echo "::warning::$f is only ${size} bytes — may still be an LFS pointer"
            else
              echo "✓ $f (${size} bytes)"
            fi
          done

      - name: Install mdBook (pre-built binary)
        run: |
          curl -sSL "https://github.com/rust-lang/mdBook/releases/download/v${MDBOOK_VERSION}/mdbook-v${MDBOOK_VERSION}-x86_64-unknown-linux-gnu.tar.gz" | tar -xz
          sudo mv mdbook /usr/local/bin/
          mdbook --version

      - name: Install mdBook plugins
        run: |
          # mdbook-mermaid is required by book.toml
          curl -sSL "https://github.com/badboy/mdbook-mermaid/releases/download/v0.17.0/mdbook-mermaid-v0.17.0-x86_64-unknown-linux-gnu.tar.gz" | tar -xz \
            && sudo mv mdbook-mermaid /usr/local/bin/ \
            && mdbook-mermaid --version
        continue-on-error: true

      - name: Build mdBook documentation
        run: |
          cd docs
          mdbook build
          touch book/.nojekyll
          cp src/robots.txt book/robots.txt 2>/dev/null || true
          mkdir -p book/assets
          cp -r src/assets/* book/assets/ 2>/dev/null || true

      - name: Install system dependencies (for cargo doc)
        continue-on-error: true
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev libudev-dev

      - name: Install Rust
        continue-on-error: true
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        continue-on-error: true
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Build API documentation
        continue-on-error: true
        run: |
          cargo doc --no-deps \
            --package astraweave-core \
            --package astraweave-ai \
            --package astraweave-physics \
            --package astraweave-nav \
            --package astraweave-render \
            --package astraweave-ecs \
            --package astraweave-behavior \
            --package astraweave-llm \
            --package astraweave-gameplay \
            --package astraweave-terrain || echo "Some packages had doc warnings"
          echo '<meta http-equiv="refresh" content="0; url=astraweave_core/index.html">' > target/doc/index.html
          mkdir -p docs/book/api
          cp -r target/doc/* docs/book/api/
          echo '<meta http-equiv="refresh" content="0; url=astraweave_core/index.html">' > docs/book/api/index.html

      - name: Generate sitemap
        continue-on-error: true
        run: |
          chmod +x docs/scripts/generate-sitemap.sh || true
          docs/scripts/generate-sitemap.sh docs/book || echo "Sitemap generation had issues"

      - name: Check for broken links
        if: ${{ !(github.event_name == 'workflow_dispatch' && inputs.skip_link_check) }}
        continue-on-error: true
        run: |
          curl -sSL https://github.com/lycheeverse/lychee/releases/download/v0.15.1/lychee-v0.15.1-x86_64-unknown-linux-gnu.tar.gz | tar -xz
          ./lychee docs/book/**/*.html \
            --exclude localhost \
            --exclude 127.0.0.1 \
            --exclude "file://" \
            --format markdown \
            --output link-report.md || true
          if [ -f link-report.md ]; then
            echo "### Link Check Report" >> $GITHUB_STEP_SUMMARY
            cat link-report.md >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload link report artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: link-report
          path: link-report.md
          retention-days: 7

      - name: Verify mdBook output
        run: |
          if [ ! -f docs/book/index.html ]; then
            echo "::error::docs/book/index.html not found — mdBook build failed"
            exit 1
          fi
          echo "mdBook output verified: $(find docs/book -name '*.html' | wc -l) HTML files"

      - name: Deploy to GitHub Pages
        if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'workflow_dispatch'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs/book
          publish_branch: gh-pages
          keep_files: true
          commit_message: 'Deploy mdBook documentation: ${{ github.sha }}'

      - name: Summary
        run: |
          echo "### Documentation Deployed ✅" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Documentation URL**: https://lazyxeon.github.io/AstraWeave-AI-Native-Gaming-Engine/" >> $GITHUB_STEP_SUMMARY
          echo "**API Docs URL**: https://lazyxeon.github.io/AstraWeave-AI-Native-Gaming-Engine/api/" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Last Updated**: $(date -u +'%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY
