# AstraWeave Sanitizer CI Workflow
# Runs LLVM Sanitizers (ASan, LSan, TSan) on critical crates
# Schedule: Every push to main, nightly for full suite
#
# ⚠️ IMPORTANT: astraweave-render is EXCLUDED from all sanitizer testing
# GPU driver allocations cause false positives. Use wgpu validation instead.
#
# Miri testing is handled by the dedicated miri.yml workflow — not duplicated here.

name: Sanitizers

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    # Run full sanitizer suite at 3 AM UTC daily
    - cron: '0 3 * * *'
  workflow_dispatch:
    inputs:
      force_full_suite:
        description: 'Run the full nightly suite (schedule-only jobs)'
        required: false
        default: 'false'
        type: boolean

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  # Sanitizer options
  ASAN_OPTIONS: detect_leaks=1:abort_on_error=1:halt_on_error=1
  LSAN_OPTIONS: max_leaks=10:print_suppressions=0
  TSAN_OPTIONS: suppressions=scripts/tsan_suppressions.txt:second_deadlock_stack=1

jobs:
  # Fast ASan check on critical crates (every PR)
  # NOTE: Excludes render crate due to GPU driver false positives
  asan-critical:
    name: AddressSanitizer (Critical Crates)
    runs-on: ubuntu-latest
    # Only run on PRs and pushes (not nightly schedule)
    if: github.event_name != 'schedule' && !(github.event_name == 'workflow_dispatch' && inputs.force_full_suite == 'true')
    steps:
      - uses: actions/checkout@v5
      
      - name: Install Rust Nightly
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: rust-src
      
      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-asan-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-asan-
      
      - name: Run ASan on astraweave-ecs
        run: |
          RUSTFLAGS="-Zsanitizer=address" cargo +nightly test \
            -p astraweave-ecs \
            --target x86_64-unknown-linux-gnu \
            --lib \
            -- --test-threads=1
      
      - name: Run ASan on astraweave-physics
        run: |
          RUSTFLAGS="-Zsanitizer=address" cargo +nightly test \
            -p astraweave-physics \
            --target x86_64-unknown-linux-gnu \
            --lib \
            -- --test-threads=1
      
      - name: Run ASan on astraweave-core
        run: |
          RUSTFLAGS="-Zsanitizer=address" cargo +nightly test \
            -p astraweave-core \
            --target x86_64-unknown-linux-gnu \
            --lib \
            -- --test-threads=1
      
      # NOTE: astraweave-render intentionally excluded - GPU drivers cause false positives
      # GPU validation is handled by wgpu's built-in validation layers instead

  # Full ASan suite (nightly only)
  # NOTE: Excludes render crate due to GPU driver false positives
  asan-full:
    name: AddressSanitizer (Full Suite)
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.force_full_suite == 'true')
    steps:
      - uses: actions/checkout@v5
      
      - name: Install Rust Nightly
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: rust-src
      
      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-asan-full-${{ hashFiles('**/Cargo.lock') }}
      
      - name: Run ASan on all critical crates
        run: |
          # NOTE: astraweave-render excluded - GPU drivers cause ASan false positives
          # GPU validation is handled by wgpu's built-in validation layers
          #
          # Priority tiers:
          # - P0 Core: ecs, physics, core, ai, nav — MUST pass
          # - P1 Infrastructure: net, asset, memory, context — Advisory
          # - P2 Support: behavior, prompts, embeddings — Advisory
          # - EXCLUDED: llm (requires external services, excluded from standard builds)
          
          P0_CRATES=(
            astraweave-ecs
            astraweave-physics
            astraweave-core
            astraweave-ai
            astraweave-nav
          )
          
          P1_CRATES=(
            astraweave-net
            astraweave-asset
            astraweave-memory
            astraweave-context
          )
          
          P2_CRATES=(
            astraweave-behavior
            astraweave-prompts
            astraweave-embeddings
          )
          
          ALL_CRATES=("${P0_CRATES[@]}" "${P1_CRATES[@]}" "${P2_CRATES[@]}")
          
          echo "=== Running ASan on ${#ALL_CRATES[@]} crates ==="
          P0_FAILED=0
          ADVISORY_FAILED=0
          
          for crate in "${P0_CRATES[@]}"; do
            echo ""
            echo "=== [P0 CRITICAL] Testing $crate with ASan ==="
            if RUSTFLAGS="-Zsanitizer=address" cargo +nightly test \
              -p "$crate" \
              --target x86_64-unknown-linux-gnu \
              --lib \
              -- --test-threads=1 2>&1; then
              echo "✅ $crate passed ASan"
            else
              echo "❌ $crate FAILED ASan (P0 critical — will fail job)"
              P0_FAILED=$((P0_FAILED + 1))
            fi
          done
          
          for crate in "${P1_CRATES[@]}" "${P2_CRATES[@]}"; do
            echo ""
            echo "=== [Advisory] Testing $crate with ASan ==="
            if RUSTFLAGS="-Zsanitizer=address" cargo +nightly test \
              -p "$crate" \
              --target x86_64-unknown-linux-gnu \
              --lib \
              -- --test-threads=1 2>&1; then
              echo "✅ $crate passed ASan"
            else
              echo "⚠️ $crate had ASan failures (advisory — not blocking)"
              ADVISORY_FAILED=$((ADVISORY_FAILED + 1))
            fi
          done
          
          echo ""
          echo "=== ASan Full Suite Summary ==="
          echo "P0 crates: ${#P0_CRATES[@]} (failures: $P0_FAILED)"
          echo "Advisory crates: $(( ${#P1_CRATES[@]} + ${#P2_CRATES[@]} )) (failures: $ADVISORY_FAILED)"
          
          if [ "$P0_FAILED" -gt 0 ]; then
            echo "❌ P0 critical crate(s) failed ASan — failing job"
            exit 1
          fi
          echo "✅ All P0 crates passed ASan"

  # LeakSanitizer (fast, run on every PR)
  leak-sanitizer:
    name: LeakSanitizer
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      
      - name: Install Rust Nightly
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: rust-src
      
      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-lsan-${{ hashFiles('**/Cargo.lock') }}
      
      - name: Run LSan on astraweave-ecs
        run: |
          RUSTFLAGS="-Zsanitizer=leak" cargo +nightly test \
            -p astraweave-ecs \
            --target x86_64-unknown-linux-gnu \
            --lib \
            -- --test-threads=1
      
      - name: Run LSan on astraweave-core
        run: |
          RUSTFLAGS="-Zsanitizer=leak" cargo +nightly test \
            -p astraweave-core \
            --target x86_64-unknown-linux-gnu \
            --lib \
            -- --test-threads=1
      
      - name: Run LSan on astraweave-physics
        run: |
          RUSTFLAGS="-Zsanitizer=leak" cargo +nightly test \
            -p astraweave-physics \
            --target x86_64-unknown-linux-gnu \
            --lib \
            -- --test-threads=1
      
      - name: Run LSan on persistence (aw-save)
        run: |
          RUSTFLAGS="-Zsanitizer=leak" cargo +nightly test \
            -p aw-save \
            --target x86_64-unknown-linux-gnu \
            --lib \
            -- --test-threads=1

  # ThreadSanitizer (nightly only - ADVISORY, not must-pass)
  # TSan with async Rust has many false positives. Use for bug discovery, not gating.
  thread-sanitizer:
    name: ThreadSanitizer (Advisory)
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.force_full_suite == 'true')
    steps:
      - uses: actions/checkout@v5
      
      - name: Install Rust Nightly
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: rust-src
      
      - name: Create TSan suppressions file
        run: |
          mkdir -p scripts
          cat > scripts/tsan_suppressions.txt << 'EOF'
          # ============================================
          # TSan Suppressions for AstraWeave
          # ============================================
          # TSan with async Rust is noisy. These are known false positives.
          # This list will grow over time as we discover more.
          #
          # Last updated: February 2026
          # ============================================
          
          # Standard library false positives
          race:std::sync::mpsc
          race:std::sync::Once
          race:std::thread
          
          # Async runtime false positives (Tokio internals)
          race:tokio::runtime
          race:tokio::sync
          race:tokio::io
          race:tokio::task
          race:tokio::time
          
          # Common concurrency crates
          race:crossbeam
          race:crossbeam_channel
          race:crossbeam_deque
          race:parking_lot
          race:rayon
          race:rayon_core
          
          # External dependencies
          race:rapier3d
          race:nalgebra
          
          # GPU stack (handled by wgpu validation instead)
          race:wgpu
          race:wgpu_core
          race:wgpu_hal
          race:naga
          race:ash
          
          # Add more as discovered during tuning...
          EOF
      
      - name: Run TSan on astraweave-ai
        run: |
          echo "⚠️ TSan is ADVISORY - failures may be false positives"
          RUSTFLAGS="-Zsanitizer=thread" cargo +nightly test \
            -p astraweave-ai \
            --target x86_64-unknown-linux-gnu \
            --lib \
            -- --test-threads=1
        continue-on-error: true  # TSan is advisory, not blocking
      
      - name: Run TSan on astraweave-coordination
        run: |
          RUSTFLAGS="-Zsanitizer=thread" cargo +nightly test \
            -p astraweave-coordination \
            --target x86_64-unknown-linux-gnu \
            --lib \
            -- --test-threads=1
        continue-on-error: true  # TSan is advisory, not blocking
      
      - name: Run TSan on astraweave-ecs
        run: |
          RUSTFLAGS="-Zsanitizer=thread" cargo +nightly test \
            -p astraweave-ecs \
            --target x86_64-unknown-linux-gnu \
            --lib \
            -- --test-threads=1
        continue-on-error: true  # TSan is advisory, not blocking

  # Determinism Testing (nightly - critical for multiplayer/replay)
  # Uses per-crate targeting to avoid workspace-wide compilation failures.
  determinism:
    name: Determinism Validation
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.force_full_suite == 'true')
    steps:
      - uses: actions/checkout@v5
      
      - name: Install Rust Stable
        uses: dtolnay/rust-toolchain@stable
      
      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-determinism-${{ hashFiles('**/Cargo.lock') }}
      
      - name: Run determinism tests (astraweave-ecs)
        run: |
          echo "=== ECS Determinism Tests ==="
          cargo test -p astraweave-ecs \
            -- --test-threads=1 \
            determinism deterministic replay
      
      - name: Run determinism tests (astraweave-weaving)
        run: |
          echo "=== Weaving Determinism Tests ==="
          cargo test -p astraweave-weaving \
            -- --test-threads=1 \
            determinism deterministic replay
      
      - name: Run determinism tests (astraweave-terrain)
        run: |
          echo "=== Terrain Determinism Tests ==="
          cargo test -p astraweave-terrain \
            -- --test-threads=1 \
            determinism deterministic replay
      
      - name: Run determinism tests (astraweave-physics)
        run: |
          echo "=== Physics Determinism Tests ==="
          cargo test -p astraweave-physics \
            -- --test-threads=1 \
            determinism deterministic replay
        continue-on-error: true  # Physics determinism is a stretch goal
      
      - name: Check for non-deterministic HashMap usage in hot paths
        run: |
          echo "Checking for non-deterministic HashMap iteration in source code..."
          echo "(HashMap iteration order is non-deterministic — use BTreeMap instead)"
          echo ""
          # Search all engine source directories, not just crates/
          FOUND=$(grep -rn "use std::collections::HashMap" --include="*.rs" \
            astraweave-ecs/src/ \
            astraweave-physics/src/ \
            astraweave-weaving/src/ \
            astraweave-terrain/src/ \
            astraweave-ai/src/ \
            astraweave-core/src/ \
            astraweave-nav/src/ \
            astraweave-gameplay/src/ \
            crates/ \
            persistence/ \
            net/ \
            2>/dev/null | head -30 || true)
          
          if [ -n "$FOUND" ]; then
            echo "⚠️ HashMap imports found in determinism-critical code:"
            echo "$FOUND"
            echo ""
            echo "Consider migrating to BTreeMap for deterministic iteration."
          else
            echo "✅ No HashMap imports found in critical paths"
          fi

  # Summary job: aggregates results from all sanitizer jobs
  sanitizer-summary:
    name: Sanitizer Summary
    runs-on: ubuntu-latest
    if: always()
    needs: [asan-critical, asan-full, leak-sanitizer, thread-sanitizer, determinism]
    steps:
      - name: Check sanitizer results
        run: |
          echo "=== Sanitizer Workflow Summary ==="
          echo ""
          echo "asan-critical:    ${{ needs.asan-critical.result }}"
          echo "asan-full:        ${{ needs.asan-full.result }}"
          echo "leak-sanitizer:   ${{ needs.leak-sanitizer.result }}"
          echo "thread-sanitizer: ${{ needs.thread-sanitizer.result }}"
          echo "determinism:      ${{ needs.determinism.result }}"
          echo ""
          
          # Fail if any critical (non-advisory) job failed
          # Skipped jobs are OK — they run on different triggers
          FAILED=0
          
          if [ "${{ needs.asan-critical.result }}" = "failure" ]; then
            echo "❌ ASan critical crates FAILED"
            FAILED=1
          fi
          
          if [ "${{ needs.asan-full.result }}" = "failure" ]; then
            echo "❌ ASan full suite FAILED"
            FAILED=1
          fi
          
          if [ "${{ needs.leak-sanitizer.result }}" = "failure" ]; then
            echo "❌ LeakSanitizer FAILED"
            FAILED=1
          fi
          
          if [ "${{ needs.determinism.result }}" = "failure" ]; then
            echo "❌ Determinism validation FAILED"
            FAILED=1
          fi
          
          # TSan is advisory — log but don't fail
          if [ "${{ needs.thread-sanitizer.result }}" = "failure" ]; then
            echo "⚠️ ThreadSanitizer had failures (advisory — not blocking)"
          fi
          
          if [ "$FAILED" -eq 1 ]; then
            echo ""
            echo "❌ One or more critical sanitizer jobs failed"
            exit 1
          fi
          
          echo ""
          echo "✅ All critical sanitizer checks passed"
