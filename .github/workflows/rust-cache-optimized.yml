name: Rust Cache Optimized Build

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:
    inputs:
      build_mode:
        description: 'Build mode'
        required: true
        default: 'standard'
        type: choice
        options: [standard, full, release-only]
      enable_sccache:
        description: 'Enable sccache compilation caching'
        required: false
        default: true
        type: boolean

# Prevent multiple builds on same PR/branch
concurrency:
  group: rust-cache-optimized-${{ github.ref }}
  cancel-in-progress: true

# Security hardening
permissions:
  contents: read

# Force bash on ALL platforms (Windows has Git Bash via actions/checkout).
# This ensures $GITHUB_ENV, mkdir -p, etc. work identically everywhere.
defaults:
  run:
    shell: bash

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0  # Better for CI with sccache
  CARGO_NET_RETRY: 10
  RUST_BACKTRACE: short
  SCCACHE_CACHE_SIZE: "10G"
  SCCACHE_IDLE_TIMEOUT: 0
  SCCACHE_NO_DAEMON: "1"  # Run sccache in no-daemon mode for CI reliability
  # Consistent exclusion list for problematic crates (one per line for readability)
  EXCLUDED_PACKAGES: >-
    --exclude astraweave-author
    --exclude visual_3d
    --exclude ui_controls_demo
    --exclude npc_town_demo
    --exclude rhai_authoring
    --exclude cutscene_render_demo
    --exclude weaving_playground
    --exclude combat_physics_demo
    --exclude navmesh_demo
    --exclude physics_demo3d
    --exclude debug_toolkit_demo
    --exclude aw_debug
    --exclude aw_editor
    --exclude aw_asset_cli

jobs:
  prepare:
    name: Prepare Build Matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
    steps:
      - name: Setup build matrix
        id: matrix
        run: |
          MODE="${{ github.event.inputs.build_mode }}"
          # Default to standard when triggered by push/PR (inputs are empty)
          MODE="${MODE:-standard}"

          if [[ "$MODE" == "release-only" ]]; then
            # Single release build on Ubuntu
            echo 'matrix={"include":[{"os":"ubuntu-latest","rust":"stable","build-type":"release","primary":true}]}' >> $GITHUB_OUTPUT
          elif [[ "$MODE" == "full" ]]; then
            # Full matrix: 3 OS × 3 toolchains × 2 profiles, with ubuntu/stable/debug as primary
            echo 'matrix={"os":["ubuntu-latest","windows-latest","macos-latest"],"rust":["stable","1.89.0","beta"],"build-type":["debug","release"],"include":[{"os":"ubuntu-latest","rust":"stable","build-type":"debug","primary":true}]}' >> $GITHUB_OUTPUT
          else
            # Standard matrix: 3 OS × 2 toolchains × 2 profiles, with ubuntu/stable/debug as primary
            echo 'matrix={"os":["ubuntu-latest","windows-latest","macos-latest"],"rust":["stable","1.89.0"],"build-type":["debug","release"],"include":[{"os":"ubuntu-latest","rust":"stable","build-type":"debug","primary":true}]}' >> $GITHUB_OUTPUT
          fi

  build:
    name: Build (${{ matrix.os }}, ${{ matrix.rust }}, ${{ matrix.build-type }})
    runs-on: ${{ matrix.os }}
    needs: prepare
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.prepare.outputs.matrix) }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.rust }}
          components: rustfmt, clippy, rust-src

      # ---- OS-specific system dependencies ----
      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -q
          sudo apt-get install -y -q \
            build-essential pkg-config cmake ninja-build \
            libx11-dev libxi-dev libxcursor-dev libxrandr-dev libxinerama-dev \
            libxkbcommon-dev libxkbcommon-x11-dev libx11-xcb-dev \
            libxcb1-dev libxcb-randr0-dev libxcb-xfixes0-dev libxcb-shape0-dev libxcb-xkb-dev \
            libgl1-mesa-dev libegl1-mesa-dev wayland-protocols libwayland-dev \
            libasound2-dev libpulse-dev libudev-dev mesa-vulkan-drivers vulkan-tools

      - name: Install system dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew update
          # Uninstall existing cmake to avoid homebrew tap conflicts
          brew uninstall --ignore-dependencies cmake || true
          brew install pkg-config cmake
          # Prefer brewed OpenSSL to avoid ring/reqwest build issues
          echo "OPENSSL_ROOT_DIR=$(brew --prefix openssl)" >> $GITHUB_ENV
          echo "OPENSSL_LIB_DIR=$(brew --prefix openssl)/lib" >> $GITHUB_ENV
          echo "OPENSSL_INCLUDE_DIR=$(brew --prefix openssl)/include" >> $GITHUB_ENV

      - name: Install system dependencies (Windows)
        if: runner.os == 'Windows'
        run: echo "Windows system dependencies ready"

      # ---- sccache via official action (handles all platforms automatically) ----
      - name: Install sccache
        if: github.event.inputs.enable_sccache != 'false'
        uses: mozilla-actions/sccache-action@v0.0.9

      # ---- Advanced Rust Cache Setup ----
      - name: Setup Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "."
          key: ${{ matrix.os }}-${{ matrix.rust }}-${{ matrix.build-type }}-v4
          cache-all-crates: true
          cache-on-failure: true
          cache-directories: |
            ~/.cargo/bin/
            ~/.cargo/registry/cache/
          save-if: ${{ github.ref == 'refs/heads/main' || matrix.primary == true }}

      # ---- Configure sccache as RUSTC_WRAPPER ----
      - name: Configure sccache wrapper
        if: github.event.inputs.enable_sccache != 'false'
        run: echo "RUSTC_WRAPPER=sccache" >> $GITHUB_ENV

      - name: Show initial sccache stats
        if: github.event.inputs.enable_sccache != 'false'
        run: sccache --show-stats || echo "sccache not available"

      # ---- Ensure target directory exists ----
      - name: Ensure target directory
        run: mkdir -p ./target

      # ---- Dependency fetching ----
      - name: Fetch dependencies
        run: cargo fetch --locked

      # ---- Core workspace check ----
      - name: Cargo check (workspace)
        run: >
          cargo check --locked --workspace
          ${{ env.EXCLUDED_PACKAGES }}
          ${{ matrix.build-type == 'release' && '--release' || '' }}

      # ---- Core component build ----
      - name: Build core components
        run: >
          cargo build --locked
          ${{ matrix.build-type == 'release' && '--release' || '' }}
          -p astraweave-core
          -p astraweave-ai
          -p astraweave-physics
          -p astraweave-nav
          -p astraweave-render
          -p astraweave-gameplay
          -p astraweave-audio
          -p astraweave-npc
          -p astraweave-input
          -p astraweave-ui
          -p astraweave-net
          -p astraweave-director
          -p astraweave-memory
          -p astraweave-persona
          -p astraweave-ipc
          -p astraweave-sdk
          -p hello_companion

      # ---- Working examples build (non-blocking) ----
      - name: Build working examples
        continue-on-error: true
        run: >
          cargo build --locked
          ${{ matrix.build-type == 'release' && '--release' || '' }}
          -p hello_companion
          -p adaptive_boss
          -p companion_profile
          -p ipc_loopback
          -p phase_director
          -p persona_loader
          -p coop_server
          -p coop_client
          -p audio_spatial_demo
          -p dialogue_voice_demo

      # ---- Test execution ----
      - name: Run tests
        if: matrix.build-type == 'debug'
        run: >
          cargo test --workspace --locked --lib
          ${{ env.EXCLUDED_PACKAGES }}

      # ---- Code quality checks (primary configuration only) ----
      - name: Check code formatting
        if: matrix.primary == true
        run: cargo fmt --all --check

      - name: Run Clippy
        if: matrix.primary == true
        run: >
          cargo clippy --workspace --locked
          ${{ env.EXCLUDED_PACKAGES }}
          --all-targets -- -D warnings

      # ---- Performance artifacts (release builds only) ----
      - name: Upload release artifacts
        if: matrix.build-type == 'release' && matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: astraweave-binaries-${{ matrix.rust }}
          path: |
            target/release/hello_companion
            target/release/deps/*.so
          retention-days: 7
          if-no-files-found: ignore

      # ---- sccache statistics ----
      - name: Show final sccache stats
        if: github.event.inputs.enable_sccache != 'false'
        run: sccache --show-stats || echo "sccache not available"

  # ---- Security audit (runs independently) ----
  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Setup audit cache
        uses: Swatinem/rust-cache@v2
        with:
          key: audit-cache-v4
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Install audit tools
        run: |
          cargo install --locked cargo-audit  || echo "cargo-audit already installed"
          cargo install --locked cargo-deny   || echo "cargo-deny already installed"

      - name: Run security audit
        continue-on-error: true
        run: cargo audit --ignore RUSTSEC-2020-0071

      - name: Run cargo-deny check
        continue-on-error: true
        run: cargo deny check

  # ---- Demo execution (Linux only for efficiency) ----
  demo-execution:
    name: Demo Execution
    runs-on: ubuntu-latest
    needs: build
    if: github.event.inputs.build_mode != 'release-only'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y -q \
            build-essential pkg-config cmake ninja-build \
            libx11-dev libxi-dev libxcursor-dev libxrandr-dev libxinerama-dev \
            libxkbcommon-dev libxkbcommon-x11-dev libx11-xcb-dev \
            libxcb1-dev libxcb-randr0-dev libxcb-xfixes0-dev libxcb-shape0-dev libxcb-xkb-dev \
            libgl1-mesa-dev libegl1-mesa-dev wayland-protocols libwayland-dev \
            libasound2-dev libpulse-dev libudev-dev mesa-vulkan-drivers vulkan-tools

      # ---- sccache for demo build ----
      - name: Install sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Configure sccache wrapper
        run: echo "RUSTC_WRAPPER=sccache" >> $GITHUB_ENV

      - name: Setup demo cache
        uses: Swatinem/rust-cache@v2
        with:
          key: demo-cache-v4
          cache-all-crates: true

      - name: Build hello_companion demo
        run: cargo build --release -p hello_companion

      - name: Run hello_companion demo (with timeout)
        run: |
          echo "Running hello_companion demo for 10 seconds..."
          timeout 10s cargo run --release -p hello_companion || echo "Demo completed or timed out as expected"

      - name: Upload demo artifacts
        uses: actions/upload-artifact@v4
        with:
          name: hello_companion-demo
          path: target/release/hello_companion
          retention-days: 7
          if-no-files-found: ignore