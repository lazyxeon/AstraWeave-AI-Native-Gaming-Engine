name: Rust Cache Optimized Build

# ---------------------------------------------------------------------------
# Architecture (designed to finish in ~30-45 min on cold cache):
#
#   +----------------+
#   |  quick-check   |  Gate: cargo check + fmt (ubuntu, ~10 min)
#   +-------+--------+
#           |
#     +-----+-------------------+
#     |     |                   |
#     v     v                   v
#   build-test   cross-check   code-quality
#   (ubuntu,     (win+mac,     (clippy + audit,
#    build+test,  check-only,   ubuntu, ~15 min)
#    ~30 min)     ~15 min)
#     |
#     v
#   demo-validation (ubuntu, ~10 min)
#
# Key design decisions:
#  - Single compilation pass per job (no redundant check->build->test)
#  - Windows: cargo check only (7GB RAM too low for full debug link)
#  - macOS: cargo check only (avoids 90-min cold-cache builds)
#  - sccache removed (conflicts with Swatinem/rust-cache; 0% hits observed)
#  - Cache saved from ALL passing jobs (not just primary)
#  - Security audit is non-blocking at job level
# ---------------------------------------------------------------------------

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:
    inputs:
      build_mode:
        description: 'Build mode'
        required: true
        default: 'standard'
        type: choice
        options: [standard, full]

# Prevent multiple builds on same PR/branch
concurrency:
  group: rust-cache-optimized-${{ github.ref }}
  cancel-in-progress: true

# Security hardening
permissions:
  contents: read

# Force bash on ALL platforms so $GITHUB_ENV, mkdir -p, etc. work everywhere
defaults:
  run:
    shell: bash

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  CARGO_NET_RETRY: 10
  RUST_BACKTRACE: short
  # Consistent exclusion list for problematic crates
  EXCLUDED_PACKAGES: >-
    --exclude astraweave-author
    --exclude visual_3d
    --exclude ui_controls_demo
    --exclude npc_town_demo
    --exclude rhai_authoring
    --exclude cutscene_render_demo
    --exclude weaving_playground
    --exclude combat_physics_demo
    --exclude navmesh_demo
    --exclude physics_demo3d
    --exclude debug_toolkit_demo
    --exclude aw_debug
    --exclude aw_editor
    --exclude aw_asset_cli

# ===========================================================================
jobs:

  # -- Stage 1: Quick gate -------------------------------------------------
  quick-check:
    name: Quick Check
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Install system dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y -q \
            build-essential pkg-config cmake ninja-build \
            libx11-dev libxi-dev libxcursor-dev libxrandr-dev libxinerama-dev \
            libxkbcommon-dev libxkbcommon-x11-dev libx11-xcb-dev \
            libxcb1-dev libxcb-randr0-dev libxcb-xfixes0-dev libxcb-shape0-dev libxcb-xkb-dev \
            libgl1-mesa-dev libegl1-mesa-dev wayland-protocols libwayland-dev \
            libasound2-dev libpulse-dev libudev-dev

      - name: Setup Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "."
          key: check-ubuntu-v5
          cache-all-crates: true
          cache-on-failure: true

      - name: Fetch dependencies
        run: cargo fetch --locked

      - name: Check workspace compiles
        run: cargo check --locked --workspace ${{ env.EXCLUDED_PACKAGES }}

      - name: Check code formatting
        run: cargo fmt --all --check

  # -- Stage 2a: Build & Test (Linux only -- single compilation pass) ------
  build-test:
    name: Build & Test (ubuntu)
    runs-on: ubuntu-latest
    needs: quick-check
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y -q \
            build-essential pkg-config cmake ninja-build \
            libx11-dev libxi-dev libxcursor-dev libxrandr-dev libxinerama-dev \
            libxkbcommon-dev libxkbcommon-x11-dev libx11-xcb-dev \
            libxcb1-dev libxcb-randr0-dev libxcb-xfixes0-dev libxcb-shape0-dev libxcb-xkb-dev \
            libgl1-mesa-dev libegl1-mesa-dev wayland-protocols libwayland-dev \
            libasound2-dev libpulse-dev libudev-dev mesa-vulkan-drivers vulkan-tools

      - name: Setup Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "."
          key: build-test-ubuntu-v5
          cache-all-crates: true
          cache-on-failure: true

      - name: Fetch dependencies
        run: cargo fetch --locked

      # Single compilation pass: cargo test --lib builds AND tests everything
      - name: Build & test workspace
        run: >
          cargo test --locked --workspace --lib
          ${{ env.EXCLUDED_PACKAGES }}

      # Examples build reuses the artifacts from the test step above
      - name: Build working examples
        continue-on-error: true
        run: >
          cargo build --locked
          -p hello_companion
          -p adaptive_boss
          -p companion_profile
          -p ipc_loopback
          -p phase_director
          -p persona_loader
          -p coop_server
          -p coop_client
          -p audio_spatial_demo
          -p dialogue_voice_demo

      # Release build of key binary for artifact upload
      - name: Build release binary
        run: cargo build --locked --release -p hello_companion

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: astraweave-binaries-stable
          path: target/release/hello_companion
          retention-days: 7
          if-no-files-found: ignore

  # -- Stage 2b: Cross-platform check (check-only, no full build) ---------
  cross-check:
    name: Cross Check (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: quick-check
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      # macOS: cmake only (pkg-config is pre-installed on GHA runners)
      - name: Install system dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew update
          brew uninstall --ignore-dependencies cmake || true
          brew install cmake
          echo "OPENSSL_ROOT_DIR=$(brew --prefix openssl)" >> $GITHUB_ENV
          echo "OPENSSL_LIB_DIR=$(brew --prefix openssl)/lib" >> $GITHUB_ENV
          echo "OPENSSL_INCLUDE_DIR=$(brew --prefix openssl)/include" >> $GITHUB_ENV

      - name: Setup Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "."
          key: cross-${{ matrix.os }}-v5
          cache-all-crates: true
          cache-on-failure: true

      - name: Fetch dependencies
        run: cargo fetch --locked

      # Check only -- no codegen, no linking, no OOM on Windows
      - name: Check workspace compiles
        run: cargo check --locked --workspace ${{ env.EXCLUDED_PACKAGES }}

  # -- Stage 2c: Code quality (clippy + security audit) -------------------
  code-quality:
    name: Code Quality
    runs-on: ubuntu-latest
    needs: quick-check
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Install system dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y -q \
            build-essential pkg-config cmake ninja-build \
            libx11-dev libxi-dev libxcursor-dev libxrandr-dev libxinerama-dev \
            libxkbcommon-dev libxkbcommon-x11-dev libx11-xcb-dev \
            libxcb1-dev libxcb-randr0-dev libxcb-xfixes0-dev libxcb-shape0-dev libxcb-xkb-dev \
            libgl1-mesa-dev libegl1-mesa-dev wayland-protocols libwayland-dev \
            libasound2-dev libpulse-dev libudev-dev

      - name: Setup Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "."
          key: quality-ubuntu-v5
          cache-all-crates: true
          cache-on-failure: true

      - name: Fetch dependencies
        run: cargo fetch --locked

      - name: Run Clippy
        run: >
          cargo clippy --locked --workspace
          ${{ env.EXCLUDED_PACKAGES }}
          --all-targets -- -D warnings

  # -- Security audit (independent, non-blocking) -------------------------
  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    # Non-blocking: known advisories produce non-zero exits
    continue-on-error: true
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Setup cache
        uses: Swatinem/rust-cache@v2
        with:
          key: audit-cache-v5
          cache-on-failure: true

      - name: Install cargo-audit
        run: cargo install --locked cargo-audit || true

      - name: Install cargo-deny
        run: cargo install --locked cargo-deny || true

      - name: Run cargo-audit
        run: |
          echo "::group::cargo audit"
          if cargo audit --ignore RUSTSEC-2020-0071; then
            echo "✅ No vulnerabilities found"
          else
            echo "⚠️ Audit found advisories (see above)"
          fi
          echo "::endgroup::"

      - name: Run cargo-deny
        run: |
          echo "::group::cargo deny"
          if cargo deny check advisories; then
            echo "✅ Advisory check passed"
          else
            echo "⚠️ Advisory warnings found (see above)"
          fi
          echo "::endgroup::"

          echo "::group::cargo deny licenses"
          if cargo deny check licenses; then
            echo "✅ License check passed"
          else
            echo "⚠️ License warnings found (see above)"
          fi
          echo "::endgroup::"

          echo "::group::cargo deny bans"
          cargo deny check bans || echo "⚠️ Ban check warnings (see above)"
          echo "::endgroup::"

          echo "::group::cargo deny sources"
          cargo deny check sources || echo "⚠️ Source check warnings (see above)"
          echo "::endgroup::"

  # -- Stage 3: Demo validation (depends on build-test) -------------------
  demo-validation:
    name: Demo Validation
    runs-on: ubuntu-latest
    needs: build-test
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y -q \
            build-essential pkg-config cmake ninja-build \
            libx11-dev libxi-dev libxcursor-dev libxrandr-dev libxinerama-dev \
            libxkbcommon-dev libxkbcommon-x11-dev libx11-xcb-dev \
            libxcb1-dev libxcb-randr0-dev libxcb-xfixes0-dev libxcb-shape0-dev libxcb-xkb-dev \
            libgl1-mesa-dev libegl1-mesa-dev wayland-protocols libwayland-dev \
            libasound2-dev libpulse-dev libudev-dev mesa-vulkan-drivers vulkan-tools

      - name: Setup Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "."
          key: demo-ubuntu-v5
          cache-all-crates: true

      - name: Build hello_companion demo
        run: cargo build --locked --release -p hello_companion

      - name: Run hello_companion demo (smoke test)
        run: |
          echo "Running hello_companion demo for 10 seconds..."
          timeout 10s cargo run --release -p hello_companion || echo "Demo completed or timed out as expected"

      - name: Upload demo artifacts
        uses: actions/upload-artifact@v4
        with:
          name: hello_companion-demo
          path: target/release/hello_companion
          retention-days: 7
          if-no-files-found: ignore